version: '3.8'

services:
  database:
    image: postgres:15.18
    container_name: observability-lab-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ObservabilityLab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability-lab-network

  rabbitmq:
    image: rabbitmq:4-management
    container_name: observability-lab-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: observability
      RABBITMQ_DEFAULT_PASS: observability
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability-lab-network

  minio:
    image: minio/minio:latest
    container_name: observability-lab-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: observability
      MINIO_ROOT_PASSWORD: observability
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability-lab-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: observability-lab-mailpit
    environment:
      MP_SMTP_RELAY_HOST: smtp.gmail.com
      MP_SMTP_RELAY_PORT: "587"
      MP_SMTP_RELAY_STARTTLS: "true"
      MP_SMTP_RELAY_AUTH: plain
      MP_SMTP_RELAY_USERNAME: ${GMAIL_USER}
      MP_SMTP_RELAY_PASSWORD: ${GMAIL_APP_PASSWORD}
      MP_SMTP_RELAY_MATCHING: "adrianhulu0611@gmail.com"
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/livez"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability-lab-network

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:

networks:
  observability-lab-network:
    driver: bridge
