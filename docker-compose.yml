version: '3.8'

services:
  database:
    image: postgres:15.18
    container_name: observability-lab-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ObservabilityLab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability-lab-network

volumes:
  postgres_data:

networks:
  observability-lab-network:
    driver: bridge
