version: '3.8'

services:
  database:
    image: postgres:15.18
    container_name: observability-lab-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ObservabilityLab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability-lab-network

  rabbitmq:
    image: rabbitmq:4-management
    container_name: observability-lab-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: observability
      RABBITMQ_DEFAULT_PASS: observability
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability-lab-network

  minio:
    image: minio/minio:latest
    container_name: observability-lab-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: observability
      MINIO_ROOT_PASSWORD: observability
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability-lab-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: observability-lab-mailpit
    environment:
      MP_SMTP_RELAY_HOST: smtp.gmail.com
      MP_SMTP_RELAY_PORT: "587"
      MP_SMTP_RELAY_STARTTLS: "true"
      MP_SMTP_RELAY_AUTH: plain
      MP_SMTP_RELAY_USERNAME: ${GMAIL_USER}
      MP_SMTP_RELAY_PASSWORD: ${GMAIL_APP_PASSWORD}
      MP_SMTP_RELAY_MATCHING: "adrianhulu0611@gmail.com"
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/livez"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability-lab-network

  tempo:
    image: grafana/tempo:latest
    container_name: observability-lab-tempo
    command: [ "-config.file=/etc/tempo/tempo.yaml" ]
    volumes:
      - ./otel/tempo.yaml:/etc/tempo/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"     # Tempo HTTP API / query
    networks:
      - observability-lab-network

  createbuckets:
    image: minio/mc:latest
    container_name: observability-lab-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 observability observability &&
      mc mb --ignore-existing local/loki-logs;
      exit 0;
      "
    networks:
      - observability-lab-network

  loki:
    image: grafana/loki:latest
    container_name: observability-lab-loki
    command: [ "-config.file=/etc/loki/loki.yaml" ]
    volumes:
      - ./otel/loki.yaml:/etc/loki/loki.yaml
      - loki_data:/loki
    ports:
      - "3100:3100"     # Loki HTTP API (push/query)
    networks:
      - observability-lab-network
    depends_on:
      - tempo
      - createbuckets

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: observability-lab-otel-collector
    command: [ "--config=/etc/otelcol-contrib/config.yaml" ]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"     # OTLP gRPC (apps export here)
      - "4318:4318"     # OTLP HTTP (apps export here)
    depends_on:
      - tempo
      - loki
    networks:
      - observability-lab-network

  grafana:
    image: grafana/grafana:latest
    container_name: observability-lab-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlSearch"
    volumes:
      - ./otel/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"     # Grafana UI (reads traces from Tempo only; apps never talk to Tempo directly)
    depends_on:
      - tempo
    networks:
      - observability-lab-network

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
  tempo_data:
  grafana_data:
  loki_data:

networks:
  observability-lab-network:
    driver: bridge
