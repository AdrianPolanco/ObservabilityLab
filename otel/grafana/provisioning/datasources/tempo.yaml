# Grafana datasource provisioning: auto-registers Tempo on container start,
# so there is no manual "Add data source" click-through.
# Grafana reads FROM Tempo's query API (:3200) — it never talks to the OTel Collector;
# the collector's only job is receiving OTLP from the apps and forwarding to Tempo's OTLP receiver (:4317, in-network only).
apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    isDefault: true
    jsonData:
      tracesToLogsV2:
        # Lets you jump from a span straight to its correlated log lines in Loki
        # (see datasources/loki.yaml). Matches on trace/span ID within the shifted
        # time window below.
        datasourceUid: loki
        spanStartTimeShift: "-1m"
        spanEndTimeShift: "1m"
        filterByTraceID: true
        filterBySpanID: true
      nodeGraph:
        enabled: true
      search:
        hide: false
      lokiSearch:
        datasourceUid: loki
